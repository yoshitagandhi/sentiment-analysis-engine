version: '3.8'

services:
  streamlit:
    build: .
    container_name: sentiment-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

  api:
    build: .
    container_name: sentiment-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload

volumes:
  data:
  models:
  outputs:
